<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>形成性測驗</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0; font-family: 'Noto Sans TC', sans-serif;
      background: #f5f5f5; color: #1a1a2e;
    }
    main { max-width: 800px; margin: 0 auto; padding: 20px 24px 60px; }
    h1 { text-align: center; font-size: clamp(1.8rem, 4vw, 2.6rem); margin: 20px 0 4px; }
    p.subtitle { text-align: center; color: #555; font-size: 1.1rem; margin: 0 0 28px; }

    .tabs { display: flex; gap: 10px; justify-content: center; margin-bottom: 28px; }
    .tab-btn {
      font-size: 1.1rem; padding: 10px 24px; border-radius: 8px; border: 2px solid #1a1a2e;
      background: #fff; color: #1a1a2e; cursor: pointer; font-weight: bold;
    }
    .tab-btn.active { background: #1a1a2e; color: #fff; }

    .panel { display: none; }
    .panel.active { display: block; }

    .card { background: #fff; border-radius: 12px; box-shadow: 0 2px 10px rgba(0,0,0,.08); padding: 24px; margin-bottom: 20px; }

    /* 出題模式 */
    .q-row { display: flex; justify-content: space-between; align-items: center; padding: 14px 0; border-bottom: 1px solid #eee; font-size: 1.1rem; }
    .q-row:last-child { border-bottom: none; }
    .q-row .q-text { flex: 1; margin-right: 12px; }
    .q-row button { font-size: .95rem; padding: 6px 14px; border-radius: 6px; border: none; cursor: pointer; margin-left: 8px; }
    .btn-del { background: #ffe0e0; color: #c0392b; }
    .btn-edit { background: #e0ecff; color: #1a4fba; }

    label { display: block; font-size: 1.05rem; font-weight: bold; margin: 14px 0 6px; }
    input[type=text], textarea {
      width: 100%; font-size: 1.1rem; padding: 10px 12px; border-radius: 8px;
      border: 2px solid #ccc; font-family: inherit;
    }
    .opt-row { display: flex; align-items: center; gap: 10px; margin: 8px 0; }
    .opt-row input[type=text] { flex: 1; }
    .opt-row input[type=radio] { width: 22px; height: 22px; }

    .btn-primary {
      font-size: 1.15rem; padding: 12px 32px; border-radius: 8px; border: none;
      background: #1f6feb; color: #fff; cursor: pointer; font-weight: bold; margin-top: 16px;
    }
    .btn-primary:disabled { background: #aaa; cursor: not-allowed; }
    .btn-secondary {
      font-size: 1.05rem; padding: 10px 24px; border-radius: 8px; border: 2px solid #1f6feb;
      background: #fff; color: #1f6feb; cursor: pointer; font-weight: bold; margin-top: 16px; margin-left: 10px;
    }

    /* 測驗模式 */
    .progress { font-size: 1.1rem; color: #555; margin-bottom: 10px; text-align: center; }
    .quiz-question { font-size: clamp(1.3rem, 3vw, 1.8rem); font-weight: bold; margin-bottom: 20px; text-align: center; }
    .option-btn {
      display: block; width: 100%; text-align: left; font-size: 1.2rem; padding: 16px 20px;
      margin-bottom: 12px; border-radius: 10px; border: 2px solid #ccc; background: #fff;
      cursor: pointer; transition: background .15s, border-color .15s;
    }
    .option-btn:hover:not(:disabled) { border-color: #1f6feb; }
    .option-btn.correct { background: #d4f7dc; border-color: #2ea043; }
    .option-btn.wrong { background: #ffdede; border-color: #c0392b; }
    .option-btn:disabled { cursor: default; opacity: 1; color: #1a1a2e; }

    .feedback { text-align: center; font-size: 1.3rem; font-weight: bold; margin: 16px 0; min-height: 1.6em; }
    .feedback.correct-text { color: #2ea043; }
    .feedback.wrong-text { color: #c0392b; }

    .center { text-align: center; }
    .score-big { font-size: clamp(2.5rem, 6vw, 4rem); font-weight: bold; color: #1f6feb; margin: 10px 0; }
    .review-item { text-align: left; padding: 12px 0; border-bottom: 1px solid #eee; font-size: 1.05rem; }
    .review-item .mark { font-weight: bold; margin-right: 8px; }
    .mark.ok { color: #2ea043; }
    .mark.no { color: #c0392b; }

    .empty { text-align: center; color: #888; font-size: 1.1rem; padding: 30px 0; }
  </style>
</head>
<body>
  <script src="nav.js"></script>
  <main>
    <h1>📝 形成性測驗</h1>
    <p class="subtitle">課堂即時小測驗・本機儲存版</p>

    <div class="tabs">
      <button class="tab-btn active" data-tab="edit">✏️ 出題</button>
      <button class="tab-btn" data-tab="quiz">🎯 測驗</button>
      <button class="tab-btn" data-tab="result">📊 結果</button>
    </div>

    <!-- 出題模式 -->
    <section class="panel active" id="panel-edit">
      <div class="card">
        <div id="q-list"></div>
        <div id="q-empty" class="empty" style="display:none;">還沒有題目，新增第一題吧！</div>
      </div>

      <div class="card">
        <h2 id="form-title" style="margin-top:0;">新增題目</h2>
        <label>題目內容</label>
        <textarea id="q-input" rows="2" placeholder="請輸入題目..."></textarea>

        <label>選項（請點選正確答案）</label>
        <div class="opt-row"><input type="radio" name="correct" value="0" checked><input type="text" class="opt-input" placeholder="選項 A"></div>
        <div class="opt-row"><input type="radio" name="correct" value="1"><input type="text" class="opt-input" placeholder="選項 B"></div>
        <div class="opt-row"><input type="radio" name="correct" value="2"><input type="text" class="opt-input" placeholder="選項 C"></div>
        <div class="opt-row"><input type="radio" name="correct" value="3"><input type="text" class="opt-input" placeholder="選項 D"></div>

        <button class="btn-primary" id="btn-save-q">新增題目</button>
        <button class="btn-secondary" id="btn-cancel-edit" style="display:none;">取消編輯</button>
      </div>
    </section>

    <!-- 測驗模式 -->
    <section class="panel" id="panel-quiz">
      <div class="card">
        <div id="quiz-empty" class="empty" style="display:none;">請先到「出題」分頁新增題目。</div>
        <div id="quiz-body" style="display:none;">
          <div class="progress" id="quiz-progress"></div>
          <div class="quiz-question" id="quiz-question"></div>
          <div id="quiz-options"></div>
          <div class="feedback" id="quiz-feedback"></div>
          <div class="center">
            <button class="btn-primary" id="btn-next" style="display:none;">下一題 →</button>
          </div>
        </div>
      </div>
    </section>

    <!-- 結果 -->
    <section class="panel" id="panel-result">
      <div class="card center">
        <div id="result-empty" class="empty" style="display:none;">還沒有測驗紀錄。</div>
        <div id="result-body" style="display:none;">
          <p style="font-size:1.2rem;">本次得分</p>
          <div class="score-big" id="score-text"></div>
          <div id="review-list" style="margin-top:20px;"></div>
          <button class="btn-primary" id="btn-retry">🔁 重新測驗</button>
        </div>
      </div>
    </section>
  </main>

  <script>
    const STORAGE_KEY = 'formative-quiz-questions';
    const RESULT_KEY = 'formative-quiz-last-result';

    function loadQuestions() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
      catch { return []; }
    }
    function saveQuestions(qs) { localStorage.setItem(STORAGE_KEY, JSON.stringify(qs)); }
    function loadResult() {
      try { return JSON.parse(localStorage.getItem(RESULT_KEY)) || null; }
      catch { return null; }
    }
    function saveResult(r) { localStorage.setItem(RESULT_KEY, JSON.stringify(r)); }

    let questions = loadQuestions();
    let editingIndex = null;

    // ---- Tabs ----
    const tabBtns = document.querySelectorAll('.tab-btn');
    const panels = { edit: document.getElementById('panel-edit'), quiz: document.getElementById('panel-quiz'), result: document.getElementById('panel-result') };
    tabBtns.forEach(btn => btn.addEventListener('click', () => {
      tabBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      Object.values(panels).forEach(p => p.classList.remove('active'));
      panels[btn.dataset.tab].classList.add('active');
      if (btn.dataset.tab === 'quiz') startQuiz();
      if (btn.dataset.tab === 'result') renderResult();
    }));

    // ---- 出題模式 ----
    const qListEl = document.getElementById('q-list');
    const qEmptyEl = document.getElementById('q-empty');
    const qInput = document.getElementById('q-input');
    const optInputs = Array.from(document.querySelectorAll('.opt-input'));
    const formTitle = document.getElementById('form-title');
    const btnSaveQ = document.getElementById('btn-save-q');
    const btnCancelEdit = document.getElementById('btn-cancel-edit');

    function renderQuestionList() {
      qListEl.innerHTML = '';
      qEmptyEl.style.display = questions.length ? 'none' : 'block';
      questions.forEach((q, i) => {
        const row = document.createElement('div');
        row.className = 'q-row';
        row.innerHTML = `<span class="q-text">${i + 1}. ${escapeHtml(q.text)}</span>`;
        const editBtn = document.createElement('button');
        editBtn.className = 'btn-edit'; editBtn.textContent = '編輯';
        editBtn.onclick = () => loadQuestionIntoForm(i);
        const delBtn = document.createElement('button');
        delBtn.className = 'btn-del'; delBtn.textContent = '刪除';
        delBtn.onclick = () => { questions.splice(i, 1); saveQuestions(questions); renderQuestionList(); };
        row.appendChild(editBtn); row.appendChild(delBtn);
        qListEl.appendChild(row);
      });
    }

    function escapeHtml(s) {
      const d = document.createElement('div'); d.textContent = s; return d.innerHTML;
    }

    function loadQuestionIntoForm(i) {
      editingIndex = i;
      const q = questions[i];
      qInput.value = q.text;
      optInputs.forEach((inp, idx) => inp.value = q.options[idx] || '');
      document.querySelector(`input[name=correct][value="${q.correct}"]`).checked = true;
      formTitle.textContent = '編輯題目';
      btnSaveQ.textContent = '儲存修改';
      btnCancelEdit.style.display = 'inline-block';
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function resetForm() {
      editingIndex = null;
      qInput.value = '';
      optInputs.forEach(inp => inp.value = '');
      document.querySelector('input[name=correct][value="0"]').checked = true;
      formTitle.textContent = '新增題目';
      btnSaveQ.textContent = '新增題目';
      btnCancelEdit.style.display = 'none';
    }

    btnSaveQ.addEventListener('click', () => {
      const text = qInput.value.trim();
      const options = optInputs.map(i => i.value.trim());
      const correct = Number(document.querySelector('input[name=correct]:checked').value);

      if (!text || options.some(o => !o)) {
        alert('請填寫題目與所有選項');
        return;
      }
      const q = { text, options, correct };
      if (editingIndex !== null) {
        questions[editingIndex] = q;
      } else {
        questions.push(q);
      }
      saveQuestions(questions);
      renderQuestionList();
      resetForm();
    });

    btnCancelEdit.addEventListener('click', resetForm);

    // ---- 測驗模式 ----
    let quizOrder = [];
    let quizIndex = 0;
    let quizScore = 0;
    let quizAnswers = [];

    function startQuiz() {
      questions = loadQuestions();
      const emptyEl = document.getElementById('quiz-empty');
      const bodyEl = document.getElementById('quiz-body');
      if (!questions.length) {
        emptyEl.style.display = 'block';
        bodyEl.style.display = 'none';
        return;
      }
      emptyEl.style.display = 'none';
      bodyEl.style.display = 'block';
      quizOrder = questions.map((_, i) => i);
      quizIndex = 0;
      quizScore = 0;
      quizAnswers = [];
      renderQuizQuestion();
    }

    function renderQuizQuestion() {
      const total = quizOrder.length;
      document.getElementById('quiz-progress').textContent = `第 ${quizIndex + 1} / ${total} 題`;
      const q = questions[quizOrder[quizIndex]];
      document.getElementById('quiz-question').textContent = q.text;
      const optWrap = document.getElementById('quiz-options');
      optWrap.innerHTML = '';
      document.getElementById('quiz-feedback').textContent = '';
      document.getElementById('quiz-feedback').className = 'feedback';
      document.getElementById('btn-next').style.display = 'none';

      q.options.forEach((opt, idx) => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.textContent = opt;
        btn.onclick = () => answerQuestion(idx);
        optWrap.appendChild(btn);
      });
    }

    function answerQuestion(idx) {
      const q = questions[quizOrder[quizIndex]];
      const buttons = document.querySelectorAll('#quiz-options .option-btn');
      buttons.forEach(b => b.disabled = true);
      const isCorrect = idx === q.correct;
      buttons[idx].classList.add(isCorrect ? 'correct' : 'wrong');
      if (!isCorrect) buttons[q.correct].classList.add('correct');

      const feedback = document.getElementById('quiz-feedback');
      feedback.textContent = isCorrect ? '✅ 答對了！' : '❌ 答錯了';
      feedback.className = 'feedback ' + (isCorrect ? 'correct-text' : 'wrong-text');

      if (isCorrect) quizScore++;
      quizAnswers.push({ text: q.text, chosen: q.options[idx], correctText: q.options[q.correct], isCorrect });

      const nextBtn = document.getElementById('btn-next');
      nextBtn.style.display = 'inline-block';
      nextBtn.onclick = () => {
        if (quizIndex + 1 < quizOrder.length) {
          quizIndex++;
          renderQuizQuestion();
        } else {
          finishQuiz();
        }
      };
    }

    function finishQuiz() {
      const result = { score: quizScore, total: quizOrder.length, answers: quizAnswers, time: Date.now() };
      saveResult(result);
      document.querySelector('.tab-btn[data-tab="result"]').click();
    }

    // ---- 結果 ----
    function renderResult() {
      const result = loadResult();
      const emptyEl = document.getElementById('result-empty');
      const bodyEl = document.getElementById('result-body');
      if (!result) {
        emptyEl.style.display = 'block';
        bodyEl.style.display = 'none';
        return;
      }
      emptyEl.style.display = 'none';
      bodyEl.style.display = 'block';
      document.getElementById('score-text').textContent = `${result.score} / ${result.total}`;
      const reviewEl = document.getElementById('review-list');
      reviewEl.innerHTML = '';
      result.answers.forEach((a, i) => {
        const div = document.createElement('div');
        div.className = 'review-item';
        div.innerHTML = `<span class="mark ${a.isCorrect ? 'ok' : 'no'}">${a.isCorrect ? '✔' : '✘'}</span>${i + 1}. ${escapeHtml(a.text)}` +
          (a.isCorrect ? '' : `<br><span style="color:#888;">你的答案：${escapeHtml(a.chosen)}　正確答案：${escapeHtml(a.correctText)}</span>`);
        reviewEl.appendChild(div);
      });
    }

    document.getElementById('btn-retry').addEventListener('click', () => {
      document.querySelector('.tab-btn[data-tab="quiz"]').click();
    });

    // ---- init ----
    renderQuestionList();
  </script>
</body>
</html>
